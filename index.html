<!DOCTYPE html>
<html>
<head>
  <title>상세페이지 생성기</title>
</head>
<body>

<h1>상세페이지 생성기</h1>

<input placeholder="상품명" id="name"><br><br>
<input placeholder="색상" id="color"><br><br>
<input placeholder="원단" id="fabric"><br><br>
<input placeholder="사이즈" id="size"><br><br>
<input placeholder="셀링포인트" id="point"><br><br>
<input placeholder="타겟" id="target"><br><br>

<button onclick="generate()">생성</button>

<pre id="result"></pre>

<script>
async function generate() {
  const data = {
    name: document.getElementById("name").value,
    color: document.getElementById("color").value,
    fabric: document.getElementById("fabric").value,
    size: document.getElementById("size").value,
    point: document.getElementById("point").value,
    target: document.getElementById("target").value
  };

  const res = await fetch("/api/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  const json = await res.json();
  document.getElementById("result").innerText = json.result;
}
</script>

</body>
</html>
